name: Daily Briefing Agent

on:
  schedule:
    # 아침: UTC 22:30 = JST 07:30 (GitHub Actions 지연 대비 30분 앞당김)
    - cron: '30 22 * * *'
    # 저녁: UTC 11:30 = JST 20:30 (GitHub Actions 지연 대비 30분 앞당김)
    - cron: '30 11 * * *'
  workflow_dispatch: # GitHub Actions 탭에서 수동 트리거 가능

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Code Version
        run: |
          echo "=== Git SHA ==="
          git rev-parse HEAD
          echo "=== GEMINI_MODEL ==="
          grep "GEMINI_MODEL" main.py

      - name: Verify Gemini API
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'EOF'
          import os, sys
          from google import genai
          key = os.environ.get("GEMINI_API_KEY", "")
          if not key:
              print("ERROR: GEMINI_API_KEY is empty")
              sys.exit(1)
          try:
              client = genai.Client(api_key=key)
              resp = client.models.generate_content(model="gemini-2.0-flash", contents="ping")
              print(f"Gemini API OK: {repr(resp.text[:30])}")
          except Exception as e:
              print(f"ERROR: {type(e).__name__}: {e}", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Determine Mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          DATE_JST=$(TZ='Asia/Tokyo' date '+%Y-%m-%d')
          if [ "$HOUR" -ge 22 ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=night" >> $GITHUB_OUTPUT
          fi
          echo "date_jst=${DATE_JST}" >> $GITHUB_OUTPUT
          echo "UTC hour: $HOUR, JST date: $DATE_JST"

      - name: Restore Morning Context (Night only)
        if: steps.mode.outputs.mode == 'night'
        uses: actions/cache/restore@v4
        with:
          path: |
            output/merged_context.json
            output/todoist_raw.json
          key: morning-context-${{ steps.mode.outputs.date_jst }}
          restore-keys: |
            morning-context-

      - name: Run Agent
        env:
          PYTHONUNBUFFERED: "1"
          TODOIST_API_KEY: ${{ secrets.TODOIST_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GCAL_CLIENT_ID: ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
          GCAL_TOKEN_JSON: ${{ secrets.GCAL_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py --mode ${{ steps.mode.outputs.mode }}

      - name: Save Morning Context (Morning only)
        if: always() && steps.mode.outputs.mode == 'morning'
        uses: actions/cache/save@v4
        with:
          path: |
            output/merged_context.json
            output/todoist_raw.json
          key: morning-context-${{ steps.mode.outputs.date_jst }}
