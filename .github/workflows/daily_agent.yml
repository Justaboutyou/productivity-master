name: Daily Briefing Agent

on:
  schedule:
    # 아침: UTC 22:30 = JST 07:30 (GitHub Actions 지연 대비 30분 앞당김)
    - cron: '30 22 * * *'
    # 저녁: UTC 11:30 = JST 20:30 (GitHub Actions 지연 대비 30분 앞당김)
    - cron: '30 11 * * *'
  workflow_dispatch: # GitHub Actions 탭에서 수동 트리거 가능 (기본 morning 모드)

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Code Version
        run: |
          echo "=== Git SHA ==="
          git rev-parse HEAD
          echo "=== GEMINI_MODEL ==="
          grep "GEMINI_MODEL" main.py

      - name: Determine Mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          # UTC 22:30 = JST 07:30 (아침), UTC 11:30 = JST 20:30 (저녁)
          if [ "$HOUR" -ge 22 ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=night" >> $GITHUB_OUTPUT
          fi
          echo "UTC hour: $HOUR → mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2)"

      - name: Download Morning Artifacts (Night only)
        if: steps.mode.outputs.mode == 'night'
        uses: actions/download-artifact@v4
        with:
          name: morning-context
          path: output/
        continue-on-error: true

      - name: Run Agent
        env:
          PYTHONUNBUFFERED: "1"
          TODOIST_API_KEY: ${{ secrets.TODOIST_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GCAL_CLIENT_ID: ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
          GCAL_TOKEN_JSON: ${{ secrets.GCAL_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python main.py --mode ${{ steps.mode.outputs.mode }}

      - name: Upload Morning Artifacts (Morning only)
        if: steps.mode.outputs.mode == 'morning'
        uses: actions/upload-artifact@v4
        with:
          name: morning-context
          path: |
            output/merged_context.json
            output/todoist_raw.json
          retention-days: 1
          overwrite: true
